# Global requirements — apply to ALL variables and ALL experiments
# unless overridden in a variables/<var>.yaml or experiments/<exp>.yaml file.
# Each entry must conform to schemas/requirement.schema.json

# ── Temporal ──────────────────────────────────────────────────────────────
- check: temporal.time_monotonicity
  variable: "*"
  experiment: "*"
  requirement_class: required

- check: temporal.time_duplicates
  variable: "*"
  experiment: "*"
  requirement_class: required

- check: temporal.time_bounds_present
  variable: "*"
  experiment: "*"
  requirement_class: required

# ── Spatial ───────────────────────────────────────────────────────────────
- check: spatial.lat_range
  variable: "*"
  experiment: "*"
  requirement_class: required

- check: spatial.lon_range
  variable: "*"
  experiment: "*"
  requirement_class: required

- check: spatial.coordinate_bounds
  variable: "*"
  experiment: "*"
  requirement_class: required

# ── Data integrity ────────────────────────────────────────────────────────
