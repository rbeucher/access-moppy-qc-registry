# Global Statistics QC Checks
# Checks that compare field-wide summary statistics against expected ranges.
# Each entry must conform to schemas/check.schema.json

- id: global_stats.min_max_range
  name: "Global min/max within plausible range"
  category: global_stats
  scope: per_variable
  severity: warn
  status: accepted
  description: >
    The global minimum and maximum of the data field must fall within a
    plausible physical range for this variable. The range is sourced from
    the vocabulary object when available; otherwise a hard-coded fallback
    is used. This is a coarser sanity check than data_integrity.valid_range
    and is intended to catch catastrophic unit or scaling errors.
  implemented_in: access_moppy.qc.checks.global_stats.MinMaxRangeCheck

- id: global_stats.non_negative
  name: "Non-negative variable has no negative values"
  category: global_stats
  scope: per_variable
  severity: fail
  status: accepted
  description: >
    Variables that are physically non-negative (e.g. precipitation, sea-ice
    concentration, cloud fraction) must not contain negative values.
    Negative values indicate a unit conversion error or a numerical artefact
    from the interpolation or regridding step.
  implemented_in: access_moppy.qc.checks.global_stats.NonNegativeCheck

- id: global_stats.global_mean_range
  name: "Global mean within expected range"
  category: global_stats
  scope: per_variable
  severity: warn
  status: accepted
  description: >
    The area-weighted global mean of the field must lie within an expected
    range for this variable and experiment. Expected ranges are stored in
    the vocabulary or a separate reference file. This check is only
    applicable to global-domain atmosphere and ocean variables.
  implemented_in: access_moppy.qc.checks.global_stats.GlobalMeanRangeCheck

- id: global_stats.temporal_trend
  name: "No spurious long-term trend in control run"
  category: global_stats
  scope: per_variable
  severity: warn
  status: proposed
  description: >
    For piControl and other unforced experiments, the linear trend of the
    global mean time series should not exceed a physically motivated
    threshold. A large trend indicates a model drift or an incorrect
    initialisation.
  proposed_by: "@rbeucher"
  notes: "Requires a reference climatology or threshold table per variable."
