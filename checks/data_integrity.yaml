# Data Integrity QC Checks
# Checks on data values: valid ranges, missing data, and fill-value handling.
# Each entry must conform to schemas/check.schema.json

- id: data_integrity.valid_range
  name: "Values within valid range"
  category: data_integrity
  scope: per_variable
  severity: fail
  status: accepted
  description: >
    All non-fill data values must lie within the valid_min / valid_max
    range specified in the CMOR table for this variable. Out-of-range
    values indicate unit conversion errors, masked-value leakage, or
    model output corruption.
  implemented_in: access_moppy.qc.checks.data_integrity.ValidRangeCheck

- id: data_integrity.missing_fraction
  name: "Missing data fraction below threshold"
  category: data_integrity
  scope: per_variable
  severity: warn
  status: accepted
  description: >
    The fraction of missing (fill) values in the field must not exceed a
    configurable threshold (default 0.5 for most variables). A high
    missing fraction often indicates an incomplete write or a masking
    problem.
  implemented_in: access_moppy.qc.checks.data_integrity.MissingFractionCheck

- id: data_integrity.fill_value_consistency
  name: "Fill value consistent with _FillValue attribute"
  category: data_integrity
  scope: global
  severity: fail
  status: accepted
  description: >
    The actual fill values present in the data array must match the
    _FillValue attribute. Inconsistent fill values cause silent errors
    when the file is read by tools that rely on the _FillValue attribute.
  implemented_in: access_moppy.qc.checks.data_integrity.FillValueConsistencyCheck

- id: data_integrity.no_all_missing_timestep
  name: "No entirely-missing time steps"
  category: data_integrity
  scope: global
  severity: fail
  status: proposed
  description: >
    No time step in the output file should be entirely fill values
    (i.e. 100% missing fraction for that slice). Such steps indicate
    a failed or incomplete model output chunk.
  proposed_by: "@rbeucher"
