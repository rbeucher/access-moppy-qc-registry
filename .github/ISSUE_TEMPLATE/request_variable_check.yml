name: "Request a check for a variable / experiment"
description: >
  Ask for an existing additional or REF check to be applied to a specific
  variable, or for a specific experiment. Use this when the check already
  exists in the catalogue but is not yet wired to the variable/experiment you
  care about.
title: "[requirement] <variable> — <check_id>"
labels:
  - "type/requirement"
  - "status/proposed"
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Request a variable / experiment assignment
        This form records that a specific check should be assigned to a
        particular variable, optionally scoped to certain experiments.

        The systematic WCRP status is tracked separately in
        `requirements/wcrp.yaml`.

        Important distinctions:
        - this form proposes a `requirement_class`
        - runtime result `status` values such as `pass`, `fail`, and `not_done`
          are tracked separately and should not be used here

  - type: input
    id: check_id
    attributes:
      label: "Check id *"
      description: >
        The dot-separated check id from the catalogue, e.g.
        `global_stats.min_max_range`. Check `checks/*.yaml` for the full list.
      placeholder: "category.check_name"
    validations:
      required: true

  - type: textarea
    id: variables
    attributes:
      label: "Variable(s) *"
      description: >
        CMOR variable name(s), one per line. Use `*` for all variables.
      placeholder: |
        tas
        pr
    validations:
      required: true

  - type: textarea
    id: experiments
    attributes:
      label: "Experiment(s) *"
      description: >
        Experiment id(s), one per line. Use `*` for all experiments.
      placeholder: |
        historical
        ssp585
    validations:
      required: true

  - type: dropdown
    id: requirement_class
    attributes:
      label: "Proposed requirement class *"
      description: >
        How should this assignment apply?
        `required` = blocking, `optional` = advisory,
        `proposed` = under discussion,
        `not-applicable` = explicitly excluded,
        `wont-fix` = acknowledged but not planned.
      options:
        - required
        - optional
        - proposed
        - not-applicable
        - wont-fix
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: "Rationale *"
      description: >
        Why should this check be run for this variable/experiment combination?
        Cite model failures, data quality incidents, domain knowledge, or REF
        evaluation needs.
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: "Notes for the YAML entry"
      description: >
        Any thresholds, references, or caveats that should appear in the
        layered requirements YAML notes field.
        If you already know the expected runtime outcome defaults, mention them
        here, but do not encode them as `requirement_class`.

  - type: dropdown
    id: realm
    attributes:
      label: "Realm"
      options:
        - atmos
        - ocean
        - seaIce
        - land
        - landIce
        - oceanBgchem

  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist"
      options:
        - label: "The check id exists in checks/*.yaml (or I have opened a propose_check issue)"
          required: true
        - label: "I have verified this requirement is not already in requirements/"
          required: true
        - label: "I understand that `requirement_class` is not the same as runtime `status`"
          required: true
