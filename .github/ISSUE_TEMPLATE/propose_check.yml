name: "Propose a new QC check"
description: >
  Suggest a brand-new additional or REF check that does not yet exist in the
  catalogue.
  Once accepted, a maintainer will add the YAML entry and implement the
  corresponding Python class in ACCESS-MOPPy.
title: "[check] <short name>"
labels:
  - "type/new-check"
  - "status/proposed"
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Propose a new QC check
        Fill in all required fields. The more detail you provide, the faster
        the review will be. Required fields are marked *.

        Current catalogue layout:
        - additional data checks live in `checks/data.yaml`
        - additional spatial checks live in `checks/spatial.yaml`
        - additional temporal checks live in `checks/temporal.yaml`
        - REF checks live in `checks/ref.yaml`

        Note:
        - check definitions have their own lifecycle `status` such as `proposed` or `accepted`
        - assignment entries use `requirement_class`
        - runtime `pass` / `fail` / `not_done` results are tracked separately

  - type: input
    id: check_id
    attributes:
      label: "Proposed check id *"
      description: >
        Dot-separated identifier, e.g. `temporal.time_monotonicity` or
        `global_stats.min_max_range`. Must be unique in the catalogue.
      placeholder: "category.check_name"
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: "Layer *"
      description: Is this an additional QC check or a REF check?
      options:
        - additional
        - ref
    validations:
      required: true

  - type: checkboxes
    id: categories
    attributes:
      label: "Categories *"
      description: >
        Which dashboard categories should this check appear under?
        Use `ref` whenever the layer is `ref`.
      options:
        - label: "spatial"
        - label: "temporal"
        - label: "data"
        - label: "ref"

  - type: checkboxes
    id: scope
    attributes:
      label: "Scope *"
      description: >
        **global** = all variables and all experiments.
        **per_variable** = meaningful for a variable across experiments.
        **per_experiment** = meaningful for specific experiments.
      options:
        - label: "global"
        - label: "per_variable"
        - label: "per_experiment"

  - type: dropdown
    id: severity
    attributes:
      label: "Default severity *"
      description: What outcome level should a failing check produce?
      options:
        - fail
        - warn
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Description *"
      description: >
        What exactly does the check verify? What does a failure mean physically?
        Be specific enough that someone can implement it without asking follow-up
        questions.
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: "Rationale *"
      description: >
        Why is this check needed? Link to relevant QC documentation, model
        failures, data quality issues, or REF references that motivated the request.
    validations:
      required: true

  - type: dropdown
    id: realm
    attributes:
      label: "Realm (if per_variable)"
      description: Which model realm does this check primarily apply to?
      options:
        - atmos
        - ocean
        - seaIce
        - land
        - landIce
        - oceanBgchem
        - all
      default: 6

  - type: textarea
    id: variables
    attributes:
      label: "Affected variables (if per_variable)"
      description: >
        List the CMOR variable names this check should initially be wired to,
        one per line. Leave blank if scope is only global or per_experiment.
      placeholder: |
        tas
        pr
        tos

  - type: textarea
    id: experiments
    attributes:
      label: "Affected experiments (if experiment-specific)"
      description: >
        List experiment ids if the check should only run for certain experiments
        or if the check scope includes `per_experiment`.
        Leave blank for all experiments.
      placeholder: |
        piControl
        historical

  - type: textarea
    id: implementation_notes
    attributes:
      label: "Implementation notes"
      description: >
        Any hints for the implementer: algorithm, thresholds, reference data
        needed, edge cases, expected runtime result semantics, etc.

  - type: checkboxes
    id: checklist
    attributes:
      label: "Checklist"
      options:
        - label: "I have searched existing issues and this check is not already proposed"
          required: true
        - label: "The proposed id does not already exist in checks/*.yaml"
          required: true
