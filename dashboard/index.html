<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACCESS-MOPPy QC Registry</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="brand" href="https://www.access-nri.org.au/" target="_blank" rel="noopener">
        <img
          class="brand-logo"
          src="https://www.access-nri.org.au/wp-content/themes/accessnri/images/logos/access_logo_rgb.svg"
          alt="ACCESS-NRI logo"
        />
        <div class="brand-text">
          <span class="brand-kicker">ACCESS-NRI</span>
          <h1>ACCESS-MOPPy QC Registry</h1>
        </div>
      </a>
      <nav>
        <button class="nav-btn active" data-view="matrix">Experiment Matrix</button>
        <button class="nav-btn" data-view="variable">Variable Detail</button>
        <button class="nav-btn" data-view="check">Layered Check Coverage</button>
        <button class="nav-btn" data-view="proposals">Open Proposals</button>
      </nav>
    </div>
  </header>

  <main id="app">
    <div id="loading">Loading registry…</div>
  </main>

  <footer>
    <span id="registry-meta"></span>
    &nbsp;·&nbsp;
    <a href="https://github.com/rbeucher/access-moppy-qc-registry" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
